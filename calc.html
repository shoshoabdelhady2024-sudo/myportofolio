<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
input{
    padding: 7px;
    width: 50%;
    outline: none;
    border-radius: 20px;
    border: none;
        box-shadow: 0 0 10px rgb(1, 132, 255);
    margin: 10px;
}
input:focus{
box-shadow: 0 0 10px rgb(0, 195, 255) ;

 
}
.container{
   width: 40%;
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
   
}
.text{
width: 60%;
height: 85%;
box-shadow: 0 0 30px rgb(74, 198, 255) inset;
padding: 30px;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
}
h1{
    color: rgb(0, 183, 255);
}
#btn5{
    border: none;
    padding: 8px 12px;
     border-radius: 20px;
     color: white;
     background: linear-gradient(to left,rgb(0, 153, 255),rgb(0, 132, 255));
     position: absolute;
     left: 20px;
     top: 20px;
}
#btn5:hover{ 
     background: rgb(21, 122, 255);
}
#btn5 a{
   text-decoration: none;
   color: white;
}









@media (max-width: 750px) {
   .container{
   width: 75%;
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
   
}
.text{
width: 100%;
height: 85%;
box-shadow: 0 0 30px rgb(74, 198, 255) inset;
padding: 30px;
display: flex;

flex-direction: column;
}
input{
    padding: 7px;

    outline: none;
    border-radius: 20px;
    border: none;

}
}
@media (max-width: 450px) {
   .container{
   width: 100%;
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
   
}
.text{
width: 100%;
height: 85%;
box-shadow: 0 0 30px rgb(74, 198, 255) inset;
padding: 30px;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
}
input{
    padding: 7px;

    <title>calculate</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="container">
   
<div class="text">
<h1>enter your mony</h1>

<input type="number" id="dolar" placeholder="dolar">

<input type="number" id="pound" placeholder="pound">
</div>
</div>
<script>
    let pound=document.getElementById('pound');
let dolar=document.getElementById('dolar');

pound.onkeyup=function(){
    dolar.value=pound.value/50
}
dolar.onkeyup=function(){
    pound.value=dolar.value*50
}
pound.onmouseup=function(){
    dolar.value=pound.value/50
}
dolar.onmouseup=function(){
    pound.value=dolar.value*50
}
</script>
    <script src="main.js"></script>
</body>
</html>
