                     <button id="themeToggle" class="btn btn-dark d-flex align-items-center">
  <i id="themeIcon" class="fa-solid fa-moon" style="color: rgb(116, 192, 252);"></i>
</button>

<script>
const btn = document.getElementById("themeToggle");
const icon = document.getElementById("themeIcon");
const html = document.documentElement;


const savedTheme = localStorage.getItem("theme") || "light";
html.setAttribute("data-theme", savedTheme);


if(savedTheme === "dark"){
  icon.className = "fa-solid fa-sun";
  icon.style.color = "rgb(255, 204, 0)";
} else {
  icon.className = "fa-solid fa-moon";
  icon.style.color = "rgb(116, 192, 252)";
}


btn.addEventListener("click", () => {
  if(html.getAttribute("data-theme") === "dark"){
    html.setAttribute("data-theme", "light");
    icon.className = "fa-solid fa-moon";
    icon.style.color = "rgb(116, 192, 252)";
    localStorage.setItem("theme", "light");
  } else {
    html.setAttribute("data-theme", "dark");
    icon.className = "fa-solid fa-sun";
    icon.style.color = "rgb(255, 204, 0)";
    localStorage.setItem("theme", "dark");
  }
});
</script>

  <script>
    const form = document.getElementById('contactForm');

    form.addEventListener('submit', function(event) {
      event.preventDefault(); // يمنع الإرسال الافتراضي

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !email || !subject || !message) {
        alert("Please fill out all fields before sending.");
        return;
      }
      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
      if (!emailPattern.test(email)) {
        alert("Please enter a valid email address.");
        return;
      }

      // لو كل حاجة صح، الانتقال لصفحة thankyou.html
      window.location.href = "thankyou.html";
    });
  </script>
